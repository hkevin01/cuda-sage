name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=cudasage --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/ tests/

  smoke:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Smoke test — list-archs
        run: cuda-sage list-archs

      - name: Smoke test — analyze text (vecadd)
        run: cuda-sage analyze tests/fixtures/vecadd.ptx --arch sm_80

      - name: Smoke test — analyze text (divergent + curve)
        run: cuda-sage analyze tests/fixtures/divergent_kernel.ptx --arch sm_86 --curve

      - name: Smoke test — analyze text (matmul + curve)
        run: cuda-sage analyze tests/fixtures/matmul.ptx --arch sm_80 --curve

      - name: Smoke test — analyze JSON (vecadd)
        run: cuda-sage analyze tests/fixtures/vecadd.ptx --arch sm_80 --format json | python -c "import json,sys; d=json.load(sys.stdin); assert d[0]['occupancy']['value'] > 0; assert d[0]['divergence']['has_divergence'] == False"

      - name: Smoke test — analyze JSON (divergent)
        run: cuda-sage analyze tests/fixtures/divergent_kernel.ptx --arch sm_86 --format json | python -c "import json,sys; d=json.load(sys.stdin); assert d[0]['divergence']['has_divergence'] == True; assert d[0]['divergence']['high_severity_count'] >= 1"

      - name: Smoke test — analyze JSON (matmul with curve)
        run: cuda-sage analyze tests/fixtures/matmul.ptx --arch sm_80 --format json --curve | python -c "import json,sys; d=json.load(sys.stdin); assert 'occupancy_curve' in d[0]; assert len(d[0]['occupancy_curve']) == 10"

      - name: Smoke test — diff (same file)
        run: cuda-sage diff tests/fixtures/vecadd.ptx tests/fixtures/vecadd.ptx --arch sm_80

      - name: Smoke test — version flag
        run: cuda-sage --version | grep -q "cuda-sage v"
